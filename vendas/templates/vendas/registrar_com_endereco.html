<!-- vendas/registrar_com_endereco.html -->
{% extends 'vendas/base.html' %}
{% block title %}Cadastro - Mirna Boutique{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">📝 Complete seu cadastro</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted">E-mail: <strong>{{ email }}</strong></p>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <h5 class="mb-3">Dados Pessoais</h5>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nome Completo*</label>
                                <input type="text" name="nome" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CPF*</label>
                                <input type="text" name="cpf" class="form-control" 
                                       placeholder="000.000.000-00" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Senha*</label>
                                <input type="password" name="password1" class="form-control" 
                                       minlength="6" required placeholder="Mínimo 6 caracteres">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirmar Senha*</label>
                                <input type="password" name="password2" class="form-control" 
                                       minlength="6" required placeholder="Digite novamente">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Celular*</label>
                                <input type="tel" name="celular" class="form-control" 
                                       placeholder="(11) 99999-9999" required>
                            </div>
                        </div>
                        
                        <hr>
                        
                        <h5 class="mb-3">📍 Endereço de Entrega</h5>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">CEP*</label>
                                <input type="text" name="cep" class="form-control" 
                                       placeholder="00000-000" required>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Rua*</label>
                                <input type="text" name="rua" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Número*</label>
                                <input type="text" name="numero" class="form-control" required>
                            </div>
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Complemento</label>
                                <input type="text" name="complemento" class="form-control" 
                                       placeholder="Ap, Bloco, etc.">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Bairro*</label>
                                <input type="text" name="bairro" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cidade*</label>
                                <input type="text" name="cidade" class="form-control" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Estado*</label>
                                <select name="estado" class="form-select" required>
                                    <option value="">Selecione</option>
                                    <option value="SP">SP</option>
                                    <option value="RJ">RJ</option>
                                    <option value="MG">MG</option>
                                    <option value="ES">ES</option>
                                    <option value="RS">RS</option>
                                    <option value="PR">PR</option>
                                    <option value="SC">SC</option>
                                    <option value="SC">DF</option>
                                    <!-- outros estados -->
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-check mb-4">
                            <input type="checkbox" name="newsletter" class="form-check-input" id="newsletter" checked>
                            <label class="form-check-label" for="newsletter">
                                Receber novidades e promoções por e-mail
                            </label>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">
                                Finalizar Cadastro e Ir para o Carrinho
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
