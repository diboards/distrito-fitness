{% extends 'vendas/base.html' %}
{% block title %}Login - Mirna Boutique{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4">🔐 Acesse sua conta</h4>
                    
                    <!-- Formulário de Login -->
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="form_type" value="login">
                        
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" name="username" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            Entrar
                        </button>
                    </form>

                    <hr>
                    
                    <h5 class="text-center mb-3">Não tem conta ainda?</h5>
                    
                    <!-- Formulário SEPARADO para cadastro -->
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="form_type" value="cadastro">
                        
                        <div class="mb-3">
                            <label class="form-label">Digite seu e-mail para começar</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100">
                            Criar Conta
                        </button>
                    </form>

                    <!-- Debug: Mostrar session data -->
                    <div class="mt-3 p-2 bg-light rounded">
                        <small class="text-muted">
                            Debug: Session email - {{ request.session.email_cadastro|default:"Nenhum" }}
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
