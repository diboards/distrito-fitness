{% extends 'vendas/auth/auth_base.html' %}

{% block title %}Recuperar senha{% endblock %}
{% block heading %}Recuperar senha{% endblock %}

{% block content %}
<form method="POST">
    {% csrf_token %}
    
    <label>Email</label>
    <input type="email" name="email" class="form-control mb-3" required>

    <button class="btn btn-primary w-100">Enviar link</button>
</form>

<a href="{% url 'login' %}" class="d-block text-center mt-3">Voltar ao login</a>
{% endblock %}
